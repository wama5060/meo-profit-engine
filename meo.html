<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEO Profit Engine — Multi-Channel E-Commerce Operating System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F0F4F8; margin: 0; }
  .gradient-hero { background: linear-gradient(135deg, #1E3A5F 0%, #0F5132 100%); }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .tab-active { background: #1E3A5F; color: #fff; }
  .tab-inactive { background: #fff; color: #374151; }
  .input-field { border: 2px solid #E5E7EB; border-radius: 8px; padding: 8px 12px; width: 100%; font-size: 14px; transition: border-color 0.2s; }
  .input-field:focus { outline: none; border-color: #1E3A5F; }
  .input-yellow { background: #FFFBEB; border-color: #FCD34D; }
  .btn-primary { background: #1E3A5F; color: #fff; padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
  .btn-primary:hover { background: #16304F; }
  .metric-card { border-radius: 10px; padding: 16px; }
  .green-badge { background: #D1FAE5; color: #065F46; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .red-badge { background: #FEE2E2; color: #991B1B; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .yellow-badge { background: #FEF3C7; color: #92400E; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .check-done { color: #065F46; }
  .check-todo { color: #9CA3AF; }
  .section-title { font-size: 18px; font-weight: 700; color: #1E3A5F; margin-bottom: 4px; }
  .label { font-size: 13px; color: #6B7280; font-weight: 500; margin-bottom: 4px; display: block; }
  .value-positive { color: #065F46; font-weight: 700; }
  .value-negative { color: #991B1B; font-weight: 700; }
  .value-neutral { color: #1E3A5F; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1E3A5F; color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 600; }
  td { padding: 9px 14px; font-size: 13px; border-bottom: 1px solid #F3F4F6; }
  tr:hover td { background: #F9FAFB; }
  .highlight-row td { background: #EFF6FF; font-weight: 700; }
  .total-row td { background: #1E3A5F; color: #fff; font-weight: 700; border-radius: 0; }
  input[type=range] { accent-color: #1E3A5F; }
  .nav-logo { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .nav-sub { font-size: 11px; color: #93C5FD; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F3F4F6; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const fmt = (n, prefix='$') => {
  if (typeof n !== 'number' || isNaN(n)) return '—';
  return prefix + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
};
const fmtInt = (n, prefix='$') => prefix + Math.round(n).toLocaleString('en-US');
const fmtPct = (n) => (n*100).toFixed(1) + '%';

// ── CALCULATOR TAB ─────────────────────────────────────────────────────────
function Calculator() {
  const [inputs, setInputs] = useState({
    amzPrice: 29.99, shopPrice: 65.00, cogs: 8.50, inbound: 1.10,
    amzRef: 15, fbaFee: 4.55, storage: 0.10, returnRate: 5,
    amzAds: 3.00, shopFeeP: 2.9, shopFeeF: 0.30, shopShip: 7.00,
    cac: 18.00, repeatFreq: 2.4,
    amzOrders: 300, walmOrders: 80, shopOrders: 40
  });

  const set = (k,v) => setInputs(p => ({...p, [k]: parseFloat(v)||0}));

  const amz = () => {
    const rev = inputs.amzPrice;
    const gp = rev - inputs.cogs - inputs.inbound;
    const ref = rev * (inputs.amzRef/100);
    const ret = rev * (inputs.returnRate/100);
    const contrib = gp - ref - inputs.fbaFee - inputs.storage - ret - inputs.amzAds;
    return { rev, gp, gpPct: gp/rev, contrib, contribPct: contrib/rev };
  };

  const walm = () => {
    const rev = inputs.amzPrice * 0.95;
    const gp = rev - inputs.cogs - inputs.inbound;
    const ref = rev * 0.15;
    const ret = rev * (inputs.returnRate/100);
    const contrib = gp - ref - 3.50 - 0.10 - ret - 1.50;
    return { rev, gp, gpPct: gp/rev, contrib, contribPct: contrib/rev };
  };

  const shop = () => {
    const rev = inputs.shopPrice;
    const gp = rev - inputs.cogs - inputs.inbound;
    const fee = rev * (inputs.shopFeeP/100) + inputs.shopFeeF;
    const ret = rev * (inputs.returnRate/100);
    const contrib = gp - fee - inputs.shopShip - ret - inputs.cac;
    const ltv = gp - fee - inputs.shopShip - ret;
    const contribLTV = ltv * inputs.repeatFreq;
    const ltvcac = contribLTV / inputs.cac;
    return { rev, gp, gpPct: gp/rev, contrib, contribPct: contrib/rev, ltv, contribLTV, ltvcac };
  };

  const A = amz(), W = walm(), S = shop();

  const monthlyAOV = (inputs.amzOrders*inputs.amzPrice + inputs.walmOrders*inputs.amzPrice*0.95 + inputs.shopOrders*inputs.shopPrice) /
    Math.max(1, inputs.amzOrders+inputs.walmOrders+inputs.shopOrders);
  const totalContrib = inputs.amzOrders*A.contrib + inputs.walmOrders*W.contrib + inputs.shopOrders*S.contrib;
  const totalRev = inputs.amzOrders*A.rev + inputs.walmOrders*W.rev + inputs.shopOrders*S.rev;

  const Row = ({label, amzVal, walmVal, shopVal, bold, total}) => (
    <tr className={total ? 'total-row' : bold ? 'highlight-row' : ''}>
      <td style={{fontWeight: bold||total?700:400}}>{label}</td>
      <td style={{textAlign:'right', color: !total && amzVal<0?'#EF4444':''}}>{fmt(amzVal)}</td>
      <td style={{textAlign:'right', color: !total && walmVal<0?'#EF4444':''}}>{fmt(walmVal)}</td>
      <td style={{textAlign:'right', color: !total && shopVal<0?'#EF4444':''}}>{fmt(shopVal)}</td>
    </tr>
  );

  return (
    <div>
      <div className="mb-6">
        <div className="section-title">Unit Economics Calculator</div>
        <p className="text-sm text-gray-500">Enter your product numbers. See real profit per order across all 3 channels.</p>
      </div>

      <div className="grid grid-cols-1 gap-6 mb-8" style={{gridTemplateColumns:'1fr 2fr'}}>
        {/* Inputs */}
        <div className="card p-5">
          <div className="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">Your Inputs</div>

          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Pricing</div>
            {[
              ['Amazon Price', 'amzPrice'], ['Shopify Price', 'shopPrice'],
              ['Landed COGS', 'cogs'], ['Inbound/Prep', 'inbound']
            ].map(([l,k]) => (
              <div key={k} className="mb-2">
                <label className="label">{l}</label>
                <div className="flex items-center gap-1">
                  <span className="text-gray-400 text-sm">$</span>
                  <input type="number" step="0.01" className="input-field input-yellow" value={inputs[k]} onChange={e=>set(k,e.target.value)}/>
                </div>
              </div>
            ))}
          </div>

          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Amazon Fees</div>
            {[
              ['Referral Fee %', 'amzRef', '%'], ['FBA Fee', 'fbaFee', '$'],
              ['Storage/unit', 'storage', '$'], ['Ad Spend/order', 'amzAds', '$']
            ].map(([l,k,p]) => (
              <div key={k} className="mb-2">
                <label className="label">{l}</label>
                <div className="flex items-center gap-1">
                  {p==='$'&&<span className="text-gray-400 text-sm">$</span>}
                  <input type="number" step="0.01" className="input-field input-yellow" value={inputs[k]} onChange={e=>set(k,e.target.value)}/>
                  {p==='%'&&<span className="text-gray-400 text-sm">%</span>}
                </div>
              </div>
            ))}
          </div>

          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Shopify / DTC</div>
            {[
              ['Payment Fee %', 'shopFeeP', '%'], ['Fixed Fee', 'shopFeeF', '$'],
              ['Fulfillment', 'shopShip', '$'], ['CAC (ads)', 'cac', '$'],
              ['Repeat Freq.', 'repeatFreq', 'x']
            ].map(([l,k,p]) => (
              <div key={k} className="mb-2">
                <label className="label">{l}</label>
                <div className="flex items-center gap-1">
                  {p==='$'&&<span className="text-gray-400 text-sm">$</span>}
                  <input type="number" step="0.01" className="input-field input-yellow" value={inputs[k]} onChange={e=>set(k,e.target.value)}/>
                  {(p==='%'||p==='x')&&<span className="text-gray-400 text-sm">{p}</span>}
                </div>
              </div>
            ))}
          </div>

          <div>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Return Rate</div>
            <div className="flex items-center gap-1">
              <input type="number" step="0.1" className="input-field input-yellow" value={inputs.returnRate} onChange={e=>set('returnRate',e.target.value)}/>
              <span className="text-gray-400 text-sm">%</span>
            </div>
          </div>
        </div>

        {/* Results */}
        <div>
          {/* Per-order breakdown table */}
          <div className="card mb-4 overflow-hidden">
            <table>
              <thead>
                <tr>
                  <th>Line Item</th>
                  <th style={{textAlign:'right'}}>Amazon FBA</th>
                  <th style={{textAlign:'right'}}>Walmart</th>
                  <th style={{textAlign:'right'}}>Shopify DTC</th>
                </tr>
              </thead>
              <tbody>
                <Row label="Selling Price" amzVal={A.rev} walmVal={W.rev} shopVal={S.rev} bold/>
                <Row label="Less: Landed COGS" amzVal={-inputs.cogs} walmVal={-inputs.cogs} shopVal={-inputs.cogs}/>
                <Row label="Less: Inbound/Prep" amzVal={-inputs.inbound} walmVal={-inputs.inbound} shopVal={-inputs.inbound}/>
                <Row label="= Gross Profit" amzVal={A.gp} walmVal={W.gp} shopVal={S.gp} bold/>
                <tr className="highlight-row">
                  <td>Gross Margin %</td>
                  <td style={{textAlign:'right'}}>{fmtPct(A.gpPct)}</td>
                  <td style={{textAlign:'right'}}>{fmtPct(W.gpPct)}</td>
                  <td style={{textAlign:'right'}}>{fmtPct(S.gpPct)}</td>
                </tr>
                <Row label="Less: Platform Fees" amzVal={-(A.rev*(inputs.amzRef/100))} walmVal={-(W.rev*0.15)} shopVal={-(S.rev*(inputs.shopFeeP/100)+inputs.shopFeeF)}/>
                <Row label="Less: Fulfillment" amzVal={-inputs.fbaFee} walmVal={-3.50} shopVal={-inputs.shopShip}/>
                <Row label="Less: Storage" amzVal={-inputs.storage} walmVal={-0.10} shopVal={0}/>
                <Row label="Less: Returns" amzVal={-(A.rev*(inputs.returnRate/100))} walmVal={-(W.rev*(inputs.returnRate/100))} shopVal={-(S.rev*(inputs.returnRate/100))}/>
                <Row label="Less: Ads / CAC" amzVal={-inputs.amzAds} walmVal={-1.50} shopVal={-inputs.cac}/>
                <Row label="= CONTRIBUTION / ORDER" amzVal={A.contrib} walmVal={W.contrib} shopVal={S.contrib} total/>
                <tr className="highlight-row">
                  <td style={{fontWeight:700}}>Contribution Margin %</td>
                  <td style={{textAlign:'right', fontWeight:700, color: A.contribPct>=0.2?'#065F46':'#991B1B'}}>{fmtPct(A.contribPct)}</td>
                  <td style={{textAlign:'right', fontWeight:700, color: W.contribPct>=0.2?'#065F46':'#991B1B'}}>{fmtPct(W.contribPct)}</td>
                  <td style={{textAlign:'right', fontWeight:700, color: S.contribPct>=0.2?'#065F46':'#991B1B'}}>{fmtPct(S.contribPct)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* LTV Box */}
          <div className="card p-5 mb-4" style={{borderLeft:'4px solid #0F5132'}}>
            <div className="font-bold text-gray-700 mb-3">Shopify / DTC Lifetime Value</div>
            <div className="grid grid-cols-3 gap-4">
              <div><div className="label">Revenue LTV</div><div className="value-neutral text-lg">{fmt(inputs.shopPrice*inputs.repeatFreq)}</div></div>
              <div><div className="label">Contribution LTV</div><div className="value-neutral text-lg">{fmt(S.contribLTV)}</div></div>
              <div>
                <div className="label">LTV:CAC Ratio</div>
                <div className={`text-lg font-bold ${S.ltvcac>=3?'value-positive':'value-negative'}`}>
                  {S.ltvcac.toFixed(2)}x
                  <span className="ml-2">{S.ltvcac>=3 ? <span className="green-badge">✓ Healthy</span> : <span className="red-badge">⚠ Below 3x</span>}</span>
                </div>
              </div>
            </div>
          </div>

          {/* Monthly summary */}
          <div className="card p-5">
            <div className="font-bold text-gray-700 mb-3">Monthly Summary at Your Order Volumes</div>
            <div className="grid grid-cols-3 gap-3 mb-3">
              {[
                ['Amazon', inputs.amzOrders, 'amzOrders'],
                ['Walmart', inputs.walmOrders, 'walmOrders'],
                ['Shopify', inputs.shopOrders, 'shopOrders']
              ].map(([ch,val,k])=>(
                <div key={k}>
                  <label className="label">{ch} Orders/mo</label>
                  <input type="number" className="input-field input-yellow text-center" value={val} onChange={e=>set(k,e.target.value)}/>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-3 gap-3 pt-3" style={{borderTop:'2px solid #E5E7EB'}}>
              <div>
                <div className="label">Total Monthly Revenue</div>
                <div className="value-neutral text-xl">{fmtInt(totalRev)}</div>
              </div>
              <div>
                <div className="label">Total Contribution</div>
                <div className={`text-xl font-bold ${totalContrib>=0?'value-positive':'value-negative'}`}>{fmtInt(totalContrib)}</div>
              </div>
              <div>
                <div className="label">Blended AOV</div>
                <div className="value-neutral text-xl">{fmt(monthlyAOV)}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PROJECTIONS TAB ────────────────────────────────────────────────────────
function Projections() {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const [scenario, setScenario] = useState('realistic');

  const scenarios = {
    conservative: {
      label: 'Conservative', color: '#F59E0B',
      aov: 31, gm: 0.54, cm: 0.11, opex: 1500, startup: 12000,
      startOrders: 200, growth: 0.10,
      annualOrders: 6129, annualRev: 190000, annualGP: 102600,
      annualContrib: 20900, annualOpex: 18000, annualProfit: 2900,
      yearEndCash: -9100, breakeven: 'Beyond Mo 12'
    },
    realistic: {
      label: 'Realistic', color: '#10B981',
      aov: 34, gm: 0.56, cm: 0.165, opex: 1900, startup: 15000,
      startOrders: 350, growth: 0.15,
      annualOrders: 11294, annualRev: 384000, annualGP: 215040,
      annualContrib: 63360, annualOpex: 22800, annualProfit: 40560,
      yearEndCash: 25560, breakeven: 'Month 8'
    },
    aggressive: {
      label: 'Aggressive', color: '#3B82F6',
      aov: 38, gm: 0.58, cm: 0.205, opex: 2800, startup: 25000,
      startOrders: 500, growth: 0.20,
      annualOrders: 18316, annualRev: 696000, annualGP: 403680,
      annualContrib: 142680, annualOpex: 33600, annualProfit: 109080,
      yearEndCash: 84080, breakeven: 'Month 6'
    }
  };

  const months = ['Mo 1','Mo 2','Mo 3','Mo 4','Mo 5','Mo 6','Mo 7','Mo 8','Mo 9','Mo 10','Mo 11','Mo 12'];

  const getMonthlyData = (s) => {
    const sc = scenarios[s];
    const orders = [], revenue = [], contrib = [], cash = [];
    let ord = sc.startOrders, cumCash = sc.startup;
    for (let i=0;i<12;i++) {
      orders.push(Math.round(ord));
      const rev = ord * sc.aov;
      const con = rev * sc.cm;
      const op = con - sc.opex;
      cumCash += op;
      if (i===2) cumCash -= sc.startup*0.2;
      if (i===5) cumCash -= sc.startup*0.25;
      revenue.push(Math.round(rev));
      contrib.push(Math.round(con));
      cash.push(Math.round(cumCash));
      ord *= (1+sc.growth);
    }
    return {orders, revenue, contrib, cash};
  };

  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const d = getMonthlyData(scenario);
    const sc = scenarios[scenario];
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          { label: 'Monthly Revenue', data: d.revenue, backgroundColor: '#BFDBFE', yAxisID: 'y' },
          { label: 'Contribution $', data: d.contrib, backgroundColor: sc.color, yAxisID: 'y' },
          { label: 'Cumulative Cash', data: d.cash, type: 'line', borderColor: '#1E3A5F', backgroundColor: 'transparent', borderWidth: 2.5, pointRadius: 4, yAxisID: 'y' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: {
          y: { beginAtZero: false, ticks: { callback: v => '$'+Math.round(v/1000)+'k' } }
        }
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [scenario]);

  const sc = scenarios[scenario];

  return (
    <div>
      <div className="mb-6">
        <div className="section-title">12-Month Scenario Projector</div>
        <p className="text-sm text-gray-500">Based on real MEO benchmark data. Select a scenario to see your path to profitability.</p>
      </div>

      {/* Scenario selector */}
      <div className="flex gap-3 mb-6">
        {Object.entries(scenarios).map(([k,s])=>(
          <button key={k}
            onClick={()=>setScenario(k)}
            className="px-5 py-2 rounded-lg font-semibold text-sm border-2 transition-all"
            style={{
              borderColor: s.color,
              background: scenario===k ? s.color : '#fff',
              color: scenario===k ? '#fff' : s.color
            }}>
            {s.label}
          </button>
        ))}
      </div>

      {/* Scenario stats */}
      <div className="grid grid-cols-4 gap-4 mb-6">
        {[
          ['Blended AOV', '$'+sc.aov, ''],
          ['Contribution Margin', fmtPct(sc.cm), sc.cm>=0.2?'green':'yellow'],
          ['Break-even', sc.breakeven, sc.breakeven.includes('12')?'red':'green'],
          ['Year-end Cash', fmtInt(sc.yearEndCash), sc.yearEndCash>=0?'green':'red']
        ].map(([l,v,badge])=>(
          <div key={l} className="card p-4">
            <div className="label">{l}</div>
            <div className={`text-2xl font-bold ${badge==='green'?'value-positive':badge==='red'?'value-negative':'value-neutral'}`}>{v}</div>
          </div>
        ))}
      </div>

      {/* Chart */}
      <div className="card p-5 mb-6">
        <div style={{height:'280px'}}>
          <canvas ref={chartRef}/>
        </div>
      </div>

      {/* Annual summary table */}
      <div className="card overflow-hidden mb-6">
        <table>
          <thead>
            <tr>
              <th>Scenario</th>
              <th style={{textAlign:'right'}}>Annual Orders</th>
              <th style={{textAlign:'right'}}>Year-1 Revenue</th>
              <th style={{textAlign:'right'}}>Gross Profit</th>
              <th style={{textAlign:'right'}}>Contribution</th>
              <th style={{textAlign:'right'}}>Operating Profit</th>
              <th style={{textAlign:'right'}}>Year-end Cash</th>
              <th>Break-even</th>
            </tr>
          </thead>
          <tbody>
            {Object.entries(scenarios).map(([k,s])=>(
              <tr key={k} style={{background: scenario===k?'#EFF6FF':'', fontWeight: scenario===k?700:400}} onClick={()=>setScenario(k)} className="cursor-pointer">
                <td style={{color:s.color, fontWeight:700}}>{s.label}</td>
                <td style={{textAlign:'right'}}>{s.annualOrders.toLocaleString()}</td>
                <td style={{textAlign:'right'}}>{fmtInt(s.annualRev)}</td>
                <td style={{textAlign:'right'}}>{fmtInt(s.annualGP)}</td>
                <td style={{textAlign:'right'}}>{fmtInt(s.annualContrib)}</td>
                <td style={{textAlign:'right', color: s.annualProfit>0?'#065F46':'#991B1B', fontWeight:700}}>{fmtInt(s.annualProfit)}</td>
                <td style={{textAlign:'right', color: s.yearEndCash>0?'#065F46':'#991B1B', fontWeight:700}}>{fmtInt(s.yearEndCash)}</td>
                <td><span className={s.yearEndCash>0?'green-badge':'red-badge'}>{s.breakeven}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="card p-4" style={{background:'#ECFDF5', border:'1px solid #A7F3D0'}}>
        <div className="font-bold text-green-800 mb-1">Key Insight from the MEO Portfolio Research</div>
        <div className="text-sm text-green-700">Same operator. Different portfolio discipline. The gap between Conservative and Aggressive isn't luck — it's how early you validate your product, how tight your unit economics are, and how fast you cross-list winners without adding overhead.</div>
      </div>
    </div>
  );
}

// ── KPI TRACKER TAB ───────────────────────────────────────────────────────
function KPITracker() {
  const [vals, setVals] = useState({
    contribMargin: '', grossMargin: '', ltvcac: '', cac: '',
    amzConv: '', repeatRate: '', weeksStock: '', sellThru: '',
    returnRate: '', otdRate: '', opProfit: '', cashPos: ''
  });
  const set = (k,v) => setVals(p=>({...p,[k]:v}));

  const kpis = [
    {k:'contribMargin', label:'Contribution Margin %', target:'>20%', unit:'%', check: v=>v>20, cat:'Economics', why:'Most important MEO scaling metric'},
    {k:'grossMargin', label:'Gross Margin %', target:'>50%', unit:'%', check: v=>v>50, cat:'Economics', why:'Product health before platform costs'},
    {k:'ltvcac', label:'LTV:CAC Ratio (Shopify)', target:'>3.0x', unit:'x', check: v=>v>3, cat:'Retention', why:'Governs how fast DTC can scale profitably'},
    {k:'cac', label:'Customer Acq. Cost', target:'<$20', unit:'$', check: v=>v<20&&v>0, cat:'Sales Efficiency', why:'Keep paid growth honest'},
    {k:'amzConv', label:'Amazon Conv. Rate %', target:'>12%', unit:'%', check: v=>v>12, cat:'Conversion', why:'Listing quality + offer strength'},
    {k:'repeatRate', label:'Repeat Purchase Rate %', target:'>25%', unit:'%', check: v=>v>25, cat:'Retention', why:'DTC compounding potential'},
    {k:'weeksStock', label:'Inventory Weeks of Cover', target:'6-10 wks', unit:'wks', check: v=>v>=6&&v<=12, cat:'Inventory', why:'Avoid stockout or capital lock-up'},
    {k:'sellThru', label:'Sell-Through Rate %', target:'>80%/mo', unit:'%', check: v=>v>80, cat:'Inventory', why:'Demand vs. inventory health'},
    {k:'returnRate', label:'Return Rate %', target:'<8%', unit:'%', check: v=>v<8&&v>0, cat:'Operations', why:'Erodes margin fast above 10%'},
    {k:'otdRate', label:'On-Time Delivery %', target:'>97%', unit:'%', check: v=>v>97, cat:'Operations', why:'Account health on marketplaces'},
    {k:'opProfit', label:'Operating Profit ($/mo)', target:'>$0', unit:'$', check: v=>v>0, cat:'Cash', why:'Are you profitable yet?'},
    {k:'cashPos', label:'Cash Position ($)', target:'>Startup', unit:'$', check: v=>v>0, cat:'Cash', why:'Are you actually financeable to grow?'},
  ];

  const entered = kpis.filter(kpi => vals[kpi.k] !== '').length;
  const passing = kpis.filter(kpi => vals[kpi.k]!=='' && kpi.check(parseFloat(vals[kpi.k]))).length;

  return (
    <div>
      <div className="mb-6">
        <div className="section-title">KPI Dashboard</div>
        <p className="text-sm text-gray-500">Enter your numbers weekly. If any go red, fix it before adding more channels or ad spend.</p>
      </div>

      {entered > 0 && (
        <div className="card p-4 mb-6 flex items-center gap-6">
          <div>
            <div className="label">KPIs Entered</div>
            <div className="text-2xl font-bold value-neutral">{entered}/{kpis.length}</div>
          </div>
          <div>
            <div className="label">Passing Targets</div>
            <div className={`text-2xl font-bold ${passing===entered?'value-positive':passing>=entered*0.7?'value-neutral':'value-negative'}`}>{passing}/{entered}</div>
          </div>
          <div className="flex-1">
            <div className="label mb-1">Health Score</div>
            <div style={{background:'#E5E7EB', borderRadius:'99px', height:'10px'}}>
              <div style={{background: passing/Math.max(1,entered)>=0.8?'#10B981':'#F59E0B', width:`${(passing/Math.max(1,entered))*100}%`, height:'10px', borderRadius:'99px', transition:'width 0.5s'}}/>
            </div>
          </div>
        </div>
      )}

      <div className="card overflow-hidden">
        <table>
          <thead>
            <tr>
              <th>KPI</th>
              <th>Category</th>
              <th>Target</th>
              <th style={{textAlign:'center'}}>Your Number</th>
              <th style={{textAlign:'center'}}>Status</th>
              <th>Why It Matters</th>
            </tr>
          </thead>
          <tbody>
            {kpis.map(kpi => {
              const v = parseFloat(vals[kpi.k]);
              const entered = vals[kpi.k] !== '';
              const pass = entered && kpi.check(v);
              const fail = entered && !pass;
              return (
                <tr key={kpi.k} style={{background: fail?'#FFF5F5':pass?'#F0FFF4':''}}>
                  <td className="font-medium">{kpi.label}</td>
                  <td><span className="yellow-badge">{kpi.cat}</span></td>
                  <td className="font-mono text-sm">{kpi.target}</td>
                  <td style={{textAlign:'center'}}>
                    <div className="flex items-center justify-center gap-1">
                      {kpi.unit==='$'&&<span className="text-gray-400 text-sm">$</span>}
                      <input type="number" placeholder="—" value={vals[kpi.k]}
                        onChange={e=>set(kpi.k,e.target.value)}
                        className="input-field input-yellow text-center" style={{width:'90px'}}/>
                      {kpi.unit!=='$'&&<span className="text-gray-400 text-sm">{kpi.unit}</span>}
                    </div>
                  </td>
                  <td style={{textAlign:'center'}}>
                    {!entered ? <span className="text-gray-300">—</span>
                      : pass ? <span className="green-badge">✓ On Track</span>
                      : <span className="red-badge">⚠ Fix This</span>}
                  </td>
                  <td className="text-gray-500 text-sm">{kpi.why}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── CHECKLIST TAB ─────────────────────────────────────────────────────────
function Checklist() {
  const steps = [
    { phase:'Legal & Finance', items:[
      'Form LLC and get EIN at IRS.gov (free — takes 10 minutes online)',
      'Open a dedicated business bank account (never mix personal + business)',
      'Set up bookkeeping with channel tracking (QuickBooks, Wave, or Xero)',
      'Register for sales tax in your state'
    ]},
    { phase:'Product Research', items:[
      'Validate demand using Helium 10 or Jungle Scout (free trials available)',
      'Confirm 50%+ gross margin BEFORE buying inventory',
      'Choose 3-5 standard-size, non-hazmat SKUs to start',
      'Source from at least 2 suppliers — never depend on one',
      'Order samples before full inventory buy'
    ]},
    { phase:'Channel Setup', items:[
      'Create Amazon Professional Seller account ($39.99/mo)',
      'Enroll in Amazon Brand Registry if you have a trademark',
      'Register on Walmart Marketplace (free — no monthly fee)',
      'Launch Shopify Basic storefront ($29/mo)',
      'Install inventory sync software (Sellbrite, Linnworks, or Skubana)'
    ]},
    { phase:'Listings & Content', items:[
      'Professional product photography (white background + lifestyle shots)',
      'Write Amazon titles optimized for search intent (not vanity keywords)',
      'Create A+ Content on Amazon (can increase sales up to 8%)',
      'Optimize Walmart listing with Walmart-specific keywords',
      'Write Shopify product descriptions focused on brand story + SEO'
    ]},
    { phase:'Fulfillment', items:[
      'Choose FBA vs FBM vs 3PL per SKU — not one-size-fits-all',
      'Ship first inventory to FBA (if using Amazon fulfillment)',
      'Set safety stock buffers (minimum 2-3 weeks cover before reorder)',
      'Set up automatic reorder alerts in your inventory system'
    ]},
    { phase:'Marketing', items:[
      'Set up email capture on Shopify from day one (Klaviyo recommended)',
      'Launch small Amazon PPC test ($10-15/day, exact match only)',
      'Get first 15-20 reviews via follow-up email sequence',
      'Test bundle / multipack after 50+ orders to raise AOV',
      'Explore nano-influencer seeding after offer-market fit confirmed'
    ]},
    { phase:'Tracking & Scale', items:[
      'Install Google Analytics 4 on Shopify store',
      'Track contribution margin weekly by channel (not just total revenue)',
      'Review account health dashboards on Amazon + Walmart weekly',
      'Add Walmart cross-listing once Amazon hit 50+ orders/month',
      'Add 3rd channel ONLY after first two are contribution-margin positive',
      'Consider MCF (Multichannel Fulfillment) once velocity is proven'
    ]}
  ];

  const totalItems = steps.reduce((a,s)=>a+s.items.length, 0);
  const [checked, setChecked] = useState({});
  const toggle = (k) => setChecked(p=>({...p,[k]:!p[k]}));
  const doneCount = Object.values(checked).filter(Boolean).length;

  return (
    <div>
      <div className="mb-4 flex items-start justify-between">
        <div>
          <div className="section-title">MEO Launch Checklist</div>
          <p className="text-sm text-gray-500">Complete in order. Don't skip phases. Speed comes from doing each step right once.</p>
        </div>
        <div className="card px-5 py-3 text-center" style={{minWidth:'120px'}}>
          <div className="text-3xl font-bold value-positive">{doneCount}</div>
          <div className="text-xs text-gray-400">of {totalItems} done</div>
          <div style={{background:'#E5E7EB', borderRadius:'99px', height:'6px', marginTop:'6px'}}>
            <div style={{background:'#10B981', width:`${(doneCount/totalItems)*100}%`, height:'6px', borderRadius:'99px', transition:'width 0.3s'}}/>
          </div>
        </div>
      </div>

      {steps.map((section, si) => {
        const sectionDone = section.items.filter((_,ii)=>checked[`${si}-${ii}`]).length;
        return (
          <div key={si} className="card mb-4 overflow-hidden">
            <div className="flex items-center justify-between px-5 py-3" style={{background:'#F8FAFC', borderBottom:'1px solid #E5E7EB'}}>
              <div className="font-bold text-gray-700">{section.phase}</div>
              <span className={sectionDone===section.items.length?'green-badge':'yellow-badge'}>
                {sectionDone}/{section.items.length}
              </span>
            </div>
            <div className="p-4">
              {section.items.map((item, ii) => {
                const k = `${si}-${ii}`;
                const done = checked[k];
                return (
                  <div key={ii} className="flex items-start gap-3 py-2 cursor-pointer" onClick={()=>toggle(k)}
                    style={{borderBottom: ii<section.items.length-1?'1px solid #F3F4F6':'', textDecoration: done?'line-through':'none', color: done?'#9CA3AF':'#374151'}}>
                    <div style={{
                      width:20, height:20, minWidth:20, borderRadius:4, marginTop:2,
                      background: done?'#10B981':'#fff', border: done?'2px solid #10B981':'2px solid #D1D5DB',
                      display:'flex', alignItems:'center', justifyContent:'center'
                    }}>
                      {done && <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 6l3 3 7-7" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round"/></svg>}
                    </div>
                    <span className="text-sm leading-relaxed">{item}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}
